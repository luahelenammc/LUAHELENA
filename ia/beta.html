{% include_relative beta-core.html %}

<style>
/* Diagnostic render-safe v2: remove every compositor-sensitive layer globally. */
#starfield,.bg-glows{display:none!important}
.nav{backdrop-filter:none!important;-webkit-backdrop-filter:none!important;background:rgba(19,18,31,.97)!important}
.packet-tip,.beta-flag-subtle{backdrop-filter:none!important;-webkit-backdrop-filter:none!important}
.reveal,.reveal.show{opacity:1!important;transform:none!important;transition:none!important}
.card,.phase-card,.proof-card{
  overflow:visible!important;
  transform:none!important;
  will-change:auto!important;
  contain:none!important;
  transition:border-color .24s ease,box-shadow .24s ease,background .24s ease!important;
  background:linear-gradient(145deg,rgba(255,255,255,.072),rgba(255,255,255,.04))!important;
}
.card:hover,.phase-card:hover,.proof-card:hover{transform:none!important}
.card:before,.phase-card:before,.proof-card:before,
.card:after,.phase-card:after,.proof-card:after{display:none!important;content:none!important}

/* Mobile width hardening v2: real root lock, not overflow:clip. */
html{
  width:100%!important;
  max-width:100%!important;
  overflow-x:hidden!important;
  overscroll-behavior-x:none!important;
}
body{
  position:relative!important;
  width:100%!important;
  max-width:100%!important;
  overflow-x:hidden!important;
  overscroll-behavior-x:none!important;
  touch-action:pan-y pinch-zoom;
}
body>*,header,main,footer,.nav{
  max-width:100vw!important;
}
main,section,.wrap,.nav-inner,.hero,.hero-text,.block-grid,.rail,.rail-sticky,
.card-grid,.triple-grid,.phase-grid,.proof-grid,.contact-panel,.contact-links,
.nav-right,.hero-meta,.hero-cta,.packet-wrap{
  min-width:0!important;
  max-width:100%!important;
}
img,svg,canvas{max-width:100%!important;height:auto}

@media(max-width:700px){
  .wrap,.nav-inner{
    width:auto!important;
    max-width:none!important;
    margin-left:12px!important;
    margin-right:12px!important;
  }

  .nav-inner{
    display:grid!important;
    grid-template-columns:minmax(0,1fr)!important;
    align-items:start!important;
    gap:10px!important;
    padding:10px 0!important;
  }
  .brand{
    min-width:0!important;
    max-width:100%!important;
  }
  .nav-right{
    width:100%!important;
    min-width:0!important;
    justify-content:flex-start!important;
    align-items:center!important;
    flex-wrap:wrap!important;
  }

  .hero,.block-grid,.contact-panel{
    grid-template-columns:minmax(0,1fr)!important;
    width:100%!important;
  }
  .triple-grid,.card-grid,.phase-grid,.proof-grid{
    grid-template-columns:minmax(0,1fr)!important;
    width:100%!important;
  }

  /* Decorative orbital remains a likely visual-overflow source and adds no mobile content. */
  .v4-deco{display:none!important}

  .btn,.pill,.packet-wrap,.lang-toggle{
    min-width:0!important;
    max-width:100%!important;
  }
  .btn,.pill{
    white-space:normal!important;
    overflow-wrap:anywhere!important;
  }

  .hero h1,.section-title,.card h3,.phase-card h3,.proof-card h3,
  .section-lead,.card p,.phase-card p,.proof-card p,.contact p{
    max-width:100%!important;
    overflow-wrap:anywhere!important;
  }

  .packet-tip{
    position:fixed!important;
    left:12px!important;
    right:12px!important;
    top:82px!important;
    width:auto!important;
    max-width:none!important;
  }

  .rim{display:none!important}
}

#overflow-diagnostic{
  position:fixed;left:8px;bottom:8px;z-index:9999;
  max-width:calc(100vw - 16px);padding:6px 8px;border-radius:10px;
  background:#2c1020;color:#ffd4e8;border:1px solid #ff91c8;
  font:600 11px/1.3 system-ui,sans-serif;overflow-wrap:anywhere;
}
</style>

<script>
(() => {
  const forceStablePaint = () => {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('show'));
    document.documentElement.style.setProperty('--glow-x', '52%');
    document.documentElement.style.setProperty('--glow-y', '18%');
  };

  const selectorFor = el => {
    if (el.id) return '#' + el.id;
    const classes = typeof el.className === 'string'
      ? el.className.trim().split(/\s+/).filter(Boolean).slice(0,3)
      : [];
    return el.tagName.toLowerCase() + (classes.length ? '.' + classes.join('.') : '');
  };

  const diagnoseOverflow = () => {
    const vw = document.documentElement.clientWidth;
    const offenders = [...document.body.querySelectorAll('*')].filter(el => {
      if (el.id === 'overflow-diagnostic') return false;
      const rect = el.getBoundingClientRect();
      return rect.right > vw + 1 || rect.left < -1 || el.scrollWidth > vw + 1;
    });

    let badge = document.getElementById('overflow-diagnostic');
    if (!offenders.length) {
      if (badge) badge.remove();
      document.documentElement.dataset.overflowAudit = 'clean';
      return;
    }

    if (!badge) {
      badge = document.createElement('div');
      badge.id = 'overflow-diagnostic';
      document.body.appendChild(badge);
    }
    const excess = Math.max(0, document.documentElement.scrollWidth - vw);
    badge.textContent = `overflow +${excess}px · ${offenders.slice(0,4).map(selectorFor).join(' · ')}`;
    document.documentElement.dataset.overflowAudit = 'failed';
    window.__iaOverflowOffenders = offenders;
  };

  const run = () => requestAnimationFrame(() => {
    forceStablePaint();
    diagnoseOverflow();
  });

  run();
  addEventListener('load', run, { once:true });
  addEventListener('resize', run, { passive:true });
  addEventListener('orientationchange', run, { passive:true });
})();
</script>
