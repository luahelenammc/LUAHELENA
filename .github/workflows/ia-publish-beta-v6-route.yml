name: Publish uncached IA beta v6 route

on:
  push:
    paths:
      - '.github/workflows/ia-publish-beta-v6-route.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Copy static beta to an uncached route
        shell: bash
        run: |
          set -euo pipefail
          cp ia/beta.html ia/beta-v6-static.html
          python3 - <<'PY'
          from pathlib import Path
          p = Path('ia/beta-v6-static.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('Beta V6 Static</title>', 'Beta V6 Static — Uncached Route</title>', 1)
          s = s.replace('BETA V6 · STATIC · TOUCH-FORCED', 'BETA V6 · NEW ROUTE · TOUCH-FORCED', 1)
          p.write_text(s, encoding='utf-8')
          PY
          rm .github/workflows/ia-publish-beta-v6-route.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ia/beta-v6-static.html .github/workflows/ia-publish-beta-v6-route.yml
          git commit -m 'test(ia): publish uncached static beta v6 route'
          git push
