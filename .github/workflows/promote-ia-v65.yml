name: Promote IA V6.5

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/promote-ia-v65.yml

permissions:
  contents: write

jobs:
  promote:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Materialize approved V6.5 into ia/index.html
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');

          const indexPath = 'ia/index.html';
          const betaPath = 'ia/beta.html';
          let index = fs.readFileSync(indexPath, 'utf8');
          const beta = fs.readFileSync(betaPath, 'utf8');

          const copyMatch = beta.match(/const COPY=(\{[\s\S]*?\});\nconst PACKET=/);
          const packetMatch = beta.match(/const PACKET=`([\s\S]*?)`;\nconst frame=/);
          const translationsMatch = index.match(/const T=(\{[\s\S]*?\});\nfunction applyLang/);
          if (!copyMatch || !packetMatch || !translationsMatch) {
            throw new Error('Could not locate COPY, PACKET, or translation table.');
          }

          const copyBox = {};
          vm.runInNewContext(`COPY=${copyMatch[1]}`, copyBox);
          const COPY = copyBox.COPY;

          const translationBox = {};
          vm.runInNewContext(`T=${translationsMatch[1]}`, translationBox);
          const T = translationBox.T;
          for (const lang of ['pt', 'en']) {
            if (!T[lang] || !COPY[lang]) throw new Error(`Missing language ${lang}`);
            Object.assign(T[lang], COPY[lang]);
          }

          index = index.replace(
            translationsMatch[0],
            `const T=${JSON.stringify(T)};\nfunction applyLang`
          );

          const escapeRegex = value => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const escapeHtml = value => value
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');

          for (const [key, value] of Object.entries(COPY.pt)) {
            const re = new RegExp(
              `(<([A-Za-z][\\w:-]*)\\b[^>]*\\bdata-i=["']${escapeRegex(key)}["'][^>]*>)([\\s\\S]*?)(<\\/\\2>)`,
              'g'
            );
            index = index.replace(re, (_match, open, _tag, _old, close) =>
              `${open}${escapeHtml(value)}${close}`
            );
          }

          index = index.replace(
            /<title>[\s\S]*?<\/title>/,
            '<title>Lua Helena Moon — IA, papéis e contexto institucional · V6.5</title>'
          );
          index = index.replace(
            /<meta name="description" content="[^"]*" \/>/,
            '<meta name="description" content="Lua Helena Moon ajuda organizações a transformar documentos, fluxos, papéis, competências, decisões, critérios e conhecimento tácito em estruturas que pessoas e IA conseguem usar." />'
          );
          index = index.replace(/lua-ia-v64-lang/g, 'lua-ia-v65-lang');

          const packet = packetMatch[1]
            .replace(/`/g, '\\`')
            .replace(/\$\{/g, '\\${');
          const packetPattern = /const PACKET=`[\s\S]*?`;\nfunction downloadPacket/;
          if (!packetPattern.test(index)) throw new Error('Could not locate production packet.');
          index = index.replace(
            packetPattern,
            `const PACKET=\`${packet}\`;\nfunction downloadPacket`
          );
          index = index.replace(
            /LUA_HELENA_MOON_AI_CONTEXT_PACKET_V6_4\.md/g,
            'LUA_HELENA_MOON_AI_CONTEXT_PACKET_V6_5.md'
          );

          if (/<iframe\b/i.test(index)) throw new Error('Production index must not contain an iframe.');
          if (/noindex/i.test(index)) throw new Error('Production index must not contain noindex.');
          if (/V6\.5 Beta/i.test(index)) throw new Error('Production index must not retain Beta labeling.');
          if (!index.includes('AI Context Architecture Packet V6.5')) throw new Error('V6.5 packet missing.');
          if (!index.includes('lua-ia-v65-lang')) throw new Error('V6.5 language key missing.');

          const finalTranslations = index.match(/const T=(\{[\s\S]*?\});\nfunction applyLang/);
          const finalBox = {};
          vm.runInNewContext(`T=${finalTranslations[1]}`, finalBox);
          for (const lang of ['pt', 'en']) {
            for (const [key, value] of Object.entries(COPY[lang])) {
              if (finalBox.T[lang][key] !== value) {
                throw new Error(`Translation mismatch: ${lang}.${key}`);
              }
            }
          }

          const inlineScripts = [...index.matchAll(/<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/gi)];
          for (const script of inlineScripts) new Function(script[1]);

          fs.writeFileSync(indexPath, index, 'utf8');
          console.log(`Promoted ${indexPath}: ${Buffer.byteLength(index)} bytes; ${inlineScripts.length} inline script(s) validated.`);
          NODE

      - name: Commit promoted production page
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ia/index.html
          git diff --cached --check
          git commit -m "Promote IA page to V6.5"
          git push
