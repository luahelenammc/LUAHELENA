name: Apply IA card render safe mode v2

on:
  push:
    paths:
      - '.github/workflows/ia-card-render-safe-mode-v2.yml'

permissions:
  contents: write

jobs:
  patch-beta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove compositor-sensitive card rendering globally
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path

          path = Path('ia/beta.html')
          html = path.read_text(encoding='utf-8')

          safe_css = r'''
    /* Render-safe v2: global, not limited to touch devices.
       The card content must remain ordinary document paint rather than a transformed GPU tile. */
    #starfield,.bg-glows{display:none!important}
    .nav{backdrop-filter:none!important;-webkit-backdrop-filter:none!important;background:rgba(19,18,31,.97)!important}
    .packet-tip,.beta-flag-subtle{backdrop-filter:none!important;-webkit-backdrop-filter:none!important}
    .reveal,.reveal.show{opacity:1!important;transform:none!important;transition:none!important}
    .card,.phase-card,.proof-card{
      overflow:visible!important;
      transform:none!important;
      will-change:auto!important;
      contain:none!important;
      transition:border-color .24s ease,box-shadow .24s ease,background .24s ease!important;
      background:linear-gradient(145deg,rgba(255,255,255,.072),rgba(255,255,255,.04))!important;
    }
    .card:hover,.phase-card:hover,.proof-card:hover{transform:none!important}
    .card:before,.phase-card:before,.proof-card:before,
    .card:after,.phase-card:after,.proof-card:after{display:none!important;content:none!important}
'''

          marker = '/* Render-safe v2: global, not limited to touch devices.'
          if marker in html:
              raise SystemExit('render-safe v2 already present')
          if '</style>' not in html:
              raise SystemExit('style closing tag not found')
          html = html.replace('</style>', safe_css + '\n  </style>', 1)

          old_boot = "const startVisuals=()=>{initDynamicGlow();initStars();initReveal()};"
          new_boot = "const startVisuals=()=>{document.querySelectorAll('.reveal').forEach(el=>el.classList.add('show'))};"
          if old_boot not in html:
              raise SystemExit('visual boot signature not found')
          html = html.replace(old_boot, new_boot, 1)

          html = html.replace('Beta · correção mobile', 'Beta · render-safe v2')
          html = html.replace('· V6.5 · Beta</title>', '· V6.5 · Beta Render-safe</title>', 1)

          path.write_text(html, encoding='utf-8')
          print(f'Updated {path}: {len(html)} characters')
          PY

          rm .github/workflows/ia-card-render-safe-mode-v2.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ia/beta.html .github/workflows/ia-card-render-safe-mode-v2.yml
          git commit -m 'fix(ia): remove compositor-sensitive card layers globally'
          git push
